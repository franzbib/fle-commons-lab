  <rect width="100" height="100" fill="#FFFFFF"/>
  
  <g stroke="#222222" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Fiche d'index (Document) -->
    <rect x="25" y="20" width="50" height="60" fill="none"/>
    <!-- Ligne d'en-tête (Structure) -->
    <path d="M25 35h50"/>
    <!-- Lignes de texte -->
    <path d="M35 55h30 M35 65h15"/>
    
    <!-- Repères typographiques (Balises/Laboratoire) -->
