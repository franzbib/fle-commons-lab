    <path d="M85 15 L95 15 L95 25" fill="none"/>
    <path d="M15 85 L5 85 L5 75" fill="none"/>
    <path d="M85 85 L95 85 L95 75" fill="none"/>
  </g>
  
  <!-- Étincelle / Marqueur (IA / Mise en évidence) -->
  <rect x="62" y="62" width="13" height="13" fill="#5B4275"/>
</svg>
